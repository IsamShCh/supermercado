services:
  catalogo-db:
    image: postgres:15-alpine
    container_name: catalogo-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: contrasena_secreta
      POSTGRES_DB: catalogo-db
    ports:
      - "5432:5432"
    volumes:
      - pgdata_catalogo:/var/lib/postgresql/data

  inventario-db:
    image: postgres:15-alpine
    container_name: inventario-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: contrasena_secreta
      POSTGRES_DB: inventario-db
    ports:
      - "5433:5432"
    volumes:
      - pgdata_inventario:/var/lib/postgresql/data

  ventas-db:
    image: postgres:15-alpine
    container_name: ventas-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: contrasena_secreta
      POSTGRES_DB: ventas-db
    ports:
      - "5434:5432"
    volumes:
      - pgdata_ventas:/var/lib/postgresql/data

  usuarios-db:
    image: postgres:15-alpine
    container_name: usuarios-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: contrasena_secreta
      POSTGRES_DB: usuarios-db
    ports:
      - "5435:5432"
    volumes:
      - pgdata_usuarios:/var/lib/postgresql/data

  reportes-db:
    image: postgres:15-alpine
    container_name: reportes-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: contrasena_secreta
      POSTGRES_DB: reportes-db
    ports:
      - "5436:5432"
    volumes:
      - pgdata_reportes:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  metabase:
    image: metabase/metabase:v0.47.2
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase-app-db
      MB_DB_PORT: 5432
      MB_DB_USER: postgres
      MB_DB_PASS: contrasena_secreta
      MB_DB_HOST: metabase-db
    depends_on:
      - metabase-db
      - reportes-db

  metabase-db:
    image: postgres:15-alpine
    container_name: metabase-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: contrasena_secreta
      POSTGRES_DB: metabase-app-db
    volumes:
      - pgdata_metabase:/var/lib/postgresql/data

volumes:
  pgdata_catalogo:
  pgdata_inventario:
  pgdata_ventas:
  pgdata_usuarios:
  pgdata_reportes:
  pgdata_metabase:
