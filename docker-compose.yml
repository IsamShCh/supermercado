services:
  catalogo-db:
    image: postgres:15-alpine
    container_name: catalogo-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: contrasena_secreta
      POSTGRES_DB: catalogo-db
    ports:
      - "5432:5432"
    volumes:
      - pgdata_catalogo:/var/lib/postgresql/data

  inventario-db:
    image: postgres:15-alpine
    container_name: inventario-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: contrasena_secreta
      POSTGRES_DB: inventario-db
    ports:
      - "5433:5432"
    volumes:
      - pgdata_inventario:/var/lib/postgresql/data

  ventas-db:
    image: postgres:15-alpine
    container_name: ventas-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: contrasena_secreta
      POSTGRES_DB: ventas-db
    ports:
      - "5434:5432"
    volumes:
      - pgdata_ventas:/var/lib/postgresql/data

  usuarios-db:
    image: postgres:15-alpine
    container_name: usuarios-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: contrasena_secreta
      POSTGRES_DB: usuarios-db
    ports:
      - "5435:5432"
    volumes:
      - pgdata_usuarios:/var/lib/postgresql/data

  reportes-db:
    image: postgres:15-alpine
    container_name: reportes-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: contrasena_secreta
      POSTGRES_DB: reportes-db
    ports:
      - "5436:5432"
    volumes:
      - pgdata_reportes:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  metabase:
    image: metabase/metabase:v0.47.2
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase-app-db
      MB_DB_PORT: 5432
      MB_DB_USER: postgres
      MB_DB_PASS: contrasena_secreta
      MB_DB_HOST: metabase-db
      # Credenciales para setup automatico
      MB_ADMIN_EMAIL: admin@supermercado.com
      MB_ADMIN_PASSWORD: Password123!
      MB_ADMIN_FIRST_NAME: Admin
      MB_ADMIN_LAST_NAME: Supermercado
    depends_on:
      - metabase-db
      - reportes-db

  metabase-db:
    image: postgres:15-alpine
    container_name: metabase-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: contrasena_secreta
      POSTGRES_DB: metabase-app-db
    volumes:
      - pgdata_metabase:/var/lib/postgresql/data

  servicio-usuarios:
    build:
      context: .
      args:
        MODULE: servicio-usuarios
    container_name: servicio-usuarios
    ports:
      - "8083:8083"
      - "9093:9093"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://usuarios-db:5432/usuarios-db
    depends_on:
      usuarios-db:
        condition: service_started

  servicio-catalogo:
    build:
      context: .
      args:
        MODULE: servicio-catalogo
    container_name: servicio-catalogo
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://catalogo-db:5432/catalogo-db
      - GRPC_CLIENT_USUARIOS_HOST=servicio-usuarios
      - GRPC_CLIENT_USUARIOS_PORT=9093
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      catalogo-db:
        condition: service_started
      servicio-usuarios:
        condition: service_started
      kafka:
        condition: service_healthy

  servicio-inventario:
    build:
      context: .
      args:
        MODULE: servicio-inventario
    container_name: servicio-inventario
    ports:
      - "8081:8081"
      - "9091:9091"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://inventario-db:5432/inventario-db
      - GRPC_CLIENT_CATALOGO_HOST=servicio-catalogo
      - GRPC_CLIENT_CATALOGO_PORT=9090
      - GRPC_CLIENT_USUARIOS_HOST=servicio-usuarios
      - GRPC_CLIENT_USUARIOS_PORT=9093
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      inventario-db:
        condition: service_started
      servicio-catalogo:
        condition: service_started
      servicio-usuarios:
        condition: service_started
      kafka:
        condition: service_healthy

  servicio-ventas:
    build:
      context: .
      args:
        MODULE: servicio-ventas
    container_name: servicio-ventas
    ports:
      - "8082:8082"
      - "9092:9092"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://ventas-db:5432/ventas-db
      - GRPC_CLIENT_CATALOGO_HOST=servicio-catalogo
      - GRPC_CLIENT_CATALOGO_PORT=9090
      - GRPC_CLIENT_INVENTARIO_HOST=servicio-inventario
      - GRPC_CLIENT_INVENTARIO_PORT=9091
      - GRPC_CLIENT_USUARIOS_HOST=servicio-usuarios
      - GRPC_CLIENT_USUARIOS_PORT=9093
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      ventas-db:
        condition: service_started
      servicio-catalogo:
        condition: service_started
      servicio-inventario:
        condition: service_started
      servicio-usuarios:
        condition: service_started
      kafka:
        condition: service_healthy

  servicio-reportes:
    build:
      context: .
      args:
        MODULE: servicio-reportes
    container_name: servicio-reportes
    ports:
      - "8085:8085"
      - "9095:9095"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://reportes-db:5432/reportes-db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      reportes-db:
        condition: service_started
      kafka:
        condition: service_healthy

volumes:
  pgdata_catalogo:
  pgdata_inventario:
  pgdata_ventas:
  pgdata_usuarios:
  pgdata_reportes:
  pgdata_metabase:
