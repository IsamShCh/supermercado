# Configuración del Simulador de Supermercado
spring.application.name=simulador-supermercado

# Configuración de servicios gRPC
servicios.catalogo.host=localhost
servicios.catalogo.puerto=9090
servicios.inventario.host=localhost
servicios.inventario.puerto=9091
servicios.ventas.host=localhost
servicios.ventas.puerto=9092
servicios.usuarios.host=localhost
servicios.usuarios.puerto=9093

# Credenciales de administrador
simulador.admin.usuario=admin
simulador.admin.password=admin123

# Configuración de temporizadores acelerada (demo - en milisegundos)
simulador.tiempo.venta.min=3000
simulador.tiempo.venta.max=9000
simulador.tiempo.replenishment.min=20000
simulador.tiempo.replenishment.max=40000
simulador.tiempo.robo.min=30000
simulador.tiempo.robo.max=60000
simulador.tiempo.merma.min=40000
simulador.tiempo.merma.max=80000

# Probabilidades
simulador.probabilidad.error.fifo=0.05
simulador.probabilidad.replenishment=0.35
simulador.probabilidad.venta.multiple=0.6

# Configuración de productos y stock
simulador.productos.cantidad=10
simulador.categorias.cantidad=3
simulador.estanterias.cantidad=10
simulador.stock.inicial.minimo=50
simulador.stock.inicial.maximo=200
simulador.estanteria.capacidad.minima=20
simulador.estanteria.capacidad.maxima=50

# Logging
logging.level.com.isam.simulador=INFO
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
# Puerto del servidor web (evita conflicto con servicio-catalogo)
server.port=8097