spring.application.name=servicio-reportes
grpc.port=9095
server.port=8085

spring.datasource.url=jdbc:postgresql://localhost:5436/reportes-db
spring.datasource.username=postgres
spring.datasource.password=contrasena_secreta

#spring.batch.jdbc.initialize-schema=always
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Con esto desactivvo las validaciones automaticas. Las validaciones se realizan manualmente con un validator
spring.jpa.properties.jakarta.persistence.validation.mode=none

# Configuración de Kafka
spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.consumer.group-id=reportes-group
spring.kafka.consumer.auto-offset-reset=earliest
