syntax = "proto3";

package isam.catalogo;

import "comun.proto";

option java_multiple_files = true;
option java_package = "com.isam.grpc.catalogo";
option java_outer_classname = "CatalogoProto";


// ========================================
//SECTION - INFO Almacenes
// ========================================


// ========================================
// MENSAJES DE OFERTAS
// ========================================

message OfertaProto {
  string id_oferta = 1;
  string sku = 2;
  string precio_promocional = 3;
  string tipo_promocion = 4;
  string fecha_inicio = 5;  // YYYY-MM-DD
  string fecha_fin = 6;     // YYYY-MM-DD
  isam.comun.EstadoOferta estado = 7;
}

// ========================================
// MENSAJES DE PRODUCTOS
// ========================================

message ProductoProto {
  string sku = 1;
  oneof identificador {
    string ean = 2;
    string plu = 3;
  }
  string nombre = 4;
  string descripcion = 5;
  string precio_venta = 6;
  bool caduca = 7;
  bool es_granel = 8;
  CategoriaProto categoria  = 9;
  isam.comun.PoliticaRotacion politica_rotacion = 10;
  isam.comun.UnidadMedida unidad_medida = 11;
  repeated string etiquetas = 12;
  isam.comun.EstadoProducto estado = 13;
}


// ========================================
// MENSAJES DE CATEGORÍAS
// ========================================

message CategoriaProto {
  int64 id_categoria = 1;
  string nombre_categoria = 2;
  string descripcion = 3;
}
// ========================================
// Complejos
// ========================================

message DetallesProductoCompleto {
  
  ProductoProto producto = 1;
  repeated OfertaProto oferta = 2;
}

// ========================================
//!SECTION - INFO Almacenes
// ========================================

// ========================================
// ========================================


// ========================================
//SECTION - Messages
// ========================================

// ========================================
// AC 1. Crear producto
// ========================================

message CrearProductoRequest {
  string sku = 1;
  oneof identificador {
    string ean = 2;
    string plu = 3;
  }
  string nombre = 4;
  string descripcion = 5;
  string precio_venta = 6;
  bool caduca = 7;
  bool es_granel = 8;
  int64 id_categoria = 9;
  isam.comun.PoliticaRotacion politica_rotacion = 10;
  isam.comun.UnidadMedida unidad_medida = 11;
  repeated string etiquetas = 12;

  message Response {
    ProductoProto producto = 1;
  }
}

// =================================================================================
// AC 2. Modificar producto
// ================================================================================
// INFO_MODIFICAR_PRODUCTO = SKU + DatosActualizar
// DatosActualizar = (Nombre) + (Descripcion) + (PrecioVenta) + (IDCategoria) + 
//                   + (PoliticaRotacion) + 
//                   (IDProveedor) + (Etiquetas)
// ================================================================================
message ModificarProductoRequest {
  string sku = 1;
  DatosActualizar datos_actualizar = 2;

  message Response {
    ProductoProto producto = 1;
  }
}

// Auxiliares 
message DatosActualizar {
  optional string nombre = 1;
  optional string descripcion = 2;
  optional string precio_venta = 3;
  optional int64 id_categoria = 4;
  // optional OfertaProductoProto oferta = 5;
  optional isam.comun.PoliticaRotacion politica_rotacion = 6;
  optional string id_proveedor = 7;
  repeated string etiquetas = 8;
}

// ========================================
// AC 3. Consultar producto con SKU
// ========================================

message ConsultarProductoRequest {
  string sku = 1;

  message Response {
    ProductoProto producto = 1;
  }
}

// ========================================
// AC 4. consultar todos los productos
// ========================================

message ListarProductosRequest {
  optional isam.comun.PaginationRequest paginacion = 1;

  message Response{
    ListaProductos lista_productos = 1;
  } 
}

// Auxiliar
message ListaProductos {
  repeated DetallesProductoCompleto productos = 1;
  optional isam.comun.PaginationResponse paginacion = 2;
}

// ========================================
// AC 5. consultar siguiendo criterio
// ========================================

message BuscarProductosRequest {
  CriteriosBusqueda criterios = 1;
  optional isam.comun.PaginationRequest paginacion = 2;

  message Response {
    ListaProductos lista_productos = 1;
  }
}

// Auxiliar
message CriteriosBusqueda {
  optional string nombre = 1;
  optional int64 id_categoria = 2;
  optional string precio_min = 3;
  optional string precio_max = 4;
  optional bool es_granel = 5;
  repeated string etiquetas = 6;
}

// ========================================
// AC 6. descatalogar producto
// ========================================

message DescatalogarProductoRequest {
  string sku = 1;

  message Response {
    ProductoProto producto = 1;
  }
}

// ========================================
// AC 7. recatalogar producto
// ========================================

message RecatalogarProductoRequest {
  string sku = 1;

  message Response {
    ProductoProto producto = 1;
  }
}

// ========================================
// REQUEST - AC8: ELIMINAR PRODUCTO (Opcional)
// ========================================

// message EliminarProductoRequest {
//   string sku = 1;
// }

// message EliminarProductoResponse {
//   oneof result {
//     ProductoEliminado success = 1;
//     isam.comun.ErrorResponse error = 2;
//   }
// }

// message ProductoEliminado {
//   string sku = 1;
//   string mensaje = 2;
// }


// ========================================
// AC 9. crear categoria
// ========================================

message CrearCategoriaRequest {
  string nombre_categoria = 1;
  string descripcion = 2;

  message Response {
      CategoriaProto categoria = 1;
  }
}

// ========================================
// AC 10. modificar categoria
// ========================================
message ModificarCategoriaRequest {
  int64 id_categoria = 1;
  optional string nombre_categoria = 2;
  optional string descripcion = 3;

  message Response {
    CategoriaProto categoria = 1;
  }
}

// ========================================
// AC 11. crear oferta
// ========================================


message CrearOfertaRequest {
  string sku = 1;
  string precio_promocional = 2;
  string tipo_promocion = 3;
  string fecha_inicio = 4;  // YYYY-MM-DD
  string fecha_fin = 5;     // YYYY-MM-DD

  message Response {
    OfertaProto oferta = 1;
  }
}

// ========================================
// AC 12. asignar etiquetas
// ========================================

message AsignarEtiquetasRequest {
  string sku = 1;
  repeated string etiquetas = 2;
  message Response {
    ProductoProto producto = 1;
  }
}

// ========================================
// AC 13. traduccion entre identificadores
// ========================================


message TraducirIdentificadorRequest {
  oneof codigo {
    string sku = 1;
    string ean = 2;
    string plu = 3;
  }
  message Response {
    ResultadoTraduccion resultado_traduccion = 1;
  }
}

// Auxiliar
message ResultadoTraduccion {
  oneof codigo_entrada {
    string sku_entrada = 1;
    string ean_entrada = 2;
    string plu_entrada = 3;
  }
  oneof codigo_salida {
    string sku_salida = 4;
    string ean_salida = 5;
    string plu_salida = 6;
  }
}

// ========================================
//!SECTION - Messages
// ========================================


// ========================================
//SECTION - Servicios
// ========================================

service CatalogoService {
  // Gestión de Productos
  rpc CrearProducto(CrearProductoRequest) returns (CrearProductoRequest.Response);
  rpc ModificarProducto(ModificarProductoRequest) returns (ModificarProductoRequest.Response);
  rpc ConsultarProducto(ConsultarProductoRequest) returns (ConsultarProductoRequest.Response);
  rpc ListarProductos(ListarProductosRequest) returns (ListarProductosRequest.Response);
  rpc BuscarProductos(BuscarProductosRequest) returns (BuscarProductosRequest.Response);
  rpc DescatalogarProducto(DescatalogarProductoRequest) returns (DescatalogarProductoRequest.Response);
  rpc RecatalogarProducto(RecatalogarProductoRequest) returns (RecatalogarProductoRequest.Response);
//  rpc EliminarProducto() returns (EliminarProductoResponse);

  // Gestión de Categorías
  rpc CrearCategoria(CrearCategoriaRequest) returns (CrearCategoriaRequest.Response);
  rpc ModificarCategoria(ModificarCategoriaRequest) returns (ModificarCategoriaRequest.Response);

//   Gestión de Ofertas
  rpc CrearOferta(CrearOfertaRequest) returns (CrearOfertaRequest.Response);

  // Etiquetas
  rpc AsignarEtiquetas(AsignarEtiquetasRequest) returns (AsignarEtiquetasRequest.Response);

  // Utilidades
  rpc TraducirIdentificador(TraducirIdentificadorRequest) returns (TraducirIdentificadorRequest.Response);
}



// ========================================
// !SECTION - Servicios
// ========================================