syntax = "proto3";

package isam.inventario;

import "comun.proto";

option java_multiple_files = true;
option java_package = "com.isam.grpc.inventario";
option java_outer_classname = "InventarioServiceProto";

// ========================================
//SECTION - INFO Inventario
// ========================================

// ========================================
// ENUMERACIONES ESPECÍFICAS DE INVENTARIO
// ========================================

enum EstadoLote {
  ESTADO_LOTE_UNSPECIFIED = 0;
  DISPONIBLE = 1;
  BLOQUEADO = 2;
  ELIMINADO = 3;
}

enum TipoMovimiento {
  TIPO_MOVIMIENTO_UNSPECIFIED = 0;
  ENTRADA = 1;
  SALIDA = 2;
  AJUSTE = 3;
  TRASLADO_ESTANTERIA = 4;
  VENTA = 5;
  DEVOLUCION = 6;
  MERMA = 7;
}

enum TipoAjuste {
  TIPO_AJUSTE_UNSPECIFIED = 0;
  AJUSTE_MERMA = 1;
  ROBO = 2;
  CADUCADO = 3;
  ERROR_CONTEO = 4;
  PRODUCTO_ENCONTRADO = 5;
}

// ========================================
// MENSAJES DE PROVEEDORES
// ========================================

message ProveedorProto {
  string id_proveedor = 1;
  string nombre_proveedor = 2;
  string contacto = 3;
  string direccion = 4;
  string telefono = 5;
  string email = 6;
}

// ========================================
// MENSAJES DE INVENTARIO
// ========================================

message InventarioProto {
  string id_inventario = 1;
  string sku = 2;
  oneof identificador {
    string ean = 3;
    string plu = 4;
  }
  string cantidad_almacen = 5;
  string cantidad_estanteria = 6;
  isam.comun.UnidadMedida unidad_medida = 7;
}

// ========================================
// MENSAJES DE LOTES
// ========================================

message LoteProto {
  string id_lote = 1;
  string sku = 2;
  string id_inventario = 3;
  string numero_lote = 4;
  string cantidad_entrada = 5;      // Cantidad original al ingresar
  string cantidad_almacen = 6;      // Cantidad actual en almacén
  string cantidad_estanteria = 7;    // Cantidad actual en estantería
  optional string fecha_caducidad = 8;  // YYYY-MM-DD
  string id_proveedor = 9;
  string fecha_ingreso = 10;   // YYYY-MM-DD
  isam.comun.UnidadMedida unidad_medida = 11;
  EstadoLote estado = 12;
}

// ========================================
// MENSAJES DE MOVIMIENTOS DE INVENTARIO
// ========================================

message MovimientoInventarioProto {
  string id_movimiento = 1;
  string sku = 2;
  string id_lote = 3;
  TipoMovimiento tipo_movimiento = 4;
  string cantidad = 5;
  isam.comun.UnidadMedida unidad_medida = 6;
  string fecha_hora = 7;  // YYYY-MM-DD HH:MM:SS
  string id_usuario = 8;
  string motivo = 9;
  string observaciones = 10;
}

// ========================================
// Complejos
// ========================================

message DetallesInventarioCompleto {
  string sku = 1;
  string nombre_producto = 2;
  string stock_total_almacen = 3;
  string stock_total_estanteria = 4;
  isam.comun.UnidadMedida unidad_medida = 5;
  repeated DetalleLote lote = 6;
}

message DetalleLote {
  string id_lote = 1;
  string numero_lote = 2;
  string cantidad_almacen = 3;
  string cantidad_estanteria = 4;
  optional string fecha_caducidad = 5;  // YYYY-MM-DD
  string fecha_ingreso = 6;    // YYYY-MM-DD
}

// ========================================
//!SECTION - INFO Inventario
// ========================================

// ========================================
//SECTION - Messages
// ========================================

// ========================================
// AC14. Registrar nuevas existencias
// ========================================

message RegistrarNuevasExistenciasRequest {
  string sku = 1;
  string cantidad = 2;
  string numero_lote = 3;
  optional string fecha_caducidad = 4;  // YYYY-MM-DD
  string id_proveedor = 5;
  isam.comun.UnidadMedida unidad_medida = 6;

  message Response { //NOTE -  No coincide exactamente con el dato respuesta definido en los acontecimientos, pero nos vale.
    LoteProto lote = 1;
    InventarioProto inventario = 2;
  }
}

// ========================================
// AC16. Ajustar inventario manualmente
// ========================================

message AjustarInventarioManualRequest {
  string sku = 1;
  string cantidad_ajuste = 2;
  TipoAjuste tipo_ajuste = 3;
  string motivo_detallado = 4;
  
  oneof ubicacion_ajuste {
    AjustarAlmacen ajustar_almacen = 5;
    AjustarEstanteria ajustar_estanteria = 6;
  }

  message Response {
    InventarioProto inventario = 1;
    MovimientoInventarioProto movimiento = 2;
  }
}

// Mensajes específicos para cada tipo de ajuste
message AjustarAlmacen {
  optional string id_lote = 1;  // Opcional: especificar qué lote afectar si se conoce
}

message AjustarEstanteria {
  optional string id_lote = 1;  // Opcional: especificar qué lote afectar si se conoce
}

// ========================================
// AC18. Mover stock a estanterías
// ========================================

message MoverStockEstanteriaRequest {
  string sku = 1;
  string id_lote = 2;
  string cantidad_transladar = 3;
  isam.comun.UnidadMedida unidad_medida = 4;

  message Response {
    InventarioProto inventario = 1;
    MovimientoInventarioProto movimiento = 2;
  }
}

// ========================================
// AC19. Contabilizar stock manualmente
// ========================================

message ContabilizarStockManualRequest {
  string sku = 1;
  
  // Contabilización de estantería (opcional)
  optional string stock_fisico_estanteria = 2;
  
  // Contabilización de almacén (opcional): solo modo preciso por lotes
  optional ContabilizacionPorLotes contabilizacion_lotes = 3;

  message Response {
    InventarioProto inventario = 1;
    repeated MovimientoInventarioProto movimientos = 2;
    ReporteDiscrepancias reporte_discrepancias = 3;
  }
}

// Mensaje para contabilización detallada por lotes en almacén
message ContabilizacionPorLotes {
  repeated StockFisicoLote lotes = 1;
}

message StockFisicoLote {
  string id_lote = 1;
  string stock_fisico_almacen = 2;
}

// Reporte de discrepancias generado tras la contabilización
message ReporteDiscrepancias {
  string sku = 1;
  string stock_logico_estanteria = 2;
  string stock_fisico_estanteria = 3;
  string discrepancia_estanteria = 4;  // físico - lógico
  string stock_logico_almacen = 5;
  string stock_fisico_almacen = 6;
  string discrepancia_almacen = 7;  // físico - lógico
  repeated AjusteLote ajustes_realizados = 8;
}

message AjusteLote {
  string id_lote = 1;
  string numero_lote = 2;
  string ubicacion = 3;  // "ALMACEN" o "ESTANTERIA"
  string cantidad_ajustada = 4;  // Con signo: positivo = añadido, negativo = deducido
  string stock_anterior = 5;
  string stock_nuevo = 6;
}

// ========================================
// AC20. Consultar inventario
// ========================================

message ConsultarInventarioRequest {
  string sku = 1;

  message Response {
    DetallesInventarioCompleto detalles_inventario = 1;
  }
}

// ========================================
// AC43. Agregar proveedor
// ========================================

message AgregarProveedorRequest {
  string nombre_proveedor = 1;
  string contacto = 2;
  string direccion = 3;
  string telefono = 4;
  string email = 5;

  message Response {
    ProveedorProto proveedor = 1;
  }
}



// ========================================
// AC43. Crear inventario
// ========================================
message CrearInventarioRequest{
  string sku = 1;
  oneof identificador {
    string ean = 2;
    string plu = 3;
  }
  isam.comun.UnidadMedida unidad_medida = 4;

  message Response {
    InventarioProto inventario = 1;
  }

}

// ========================================
// Registrar Venta (Integración con Ventas)
// ========================================
message RegistrarVentaRequest {
  string numero_ticket = 1;
  repeated ItemVenta items = 2;
  
  message Response {
    repeated MovimientoInventarioProto movimientos = 1;
  }
}

message ItemVenta {
  string sku = 1;
  string cantidad = 2;  // decimal 10,3
  isam.comun.UnidadMedida unidad_medida = 3;
}

// ========================================
//!SECTION - Messages
// ========================================

// ========================================
//SECTION - Servicios
// ========================================

service InventarioService {
  // Gestión de Existencias
  rpc RegistrarNuevasExistencias(RegistrarNuevasExistenciasRequest) returns (RegistrarNuevasExistenciasRequest.Response);
  rpc AjustarInventarioManual(AjustarInventarioManualRequest) returns (AjustarInventarioManualRequest.Response);
  rpc MoverStockEstanteria(MoverStockEstanteriaRequest) returns (MoverStockEstanteriaRequest.Response);
  rpc ContabilizarStockManual(ContabilizarStockManualRequest) returns (ContabilizarStockManualRequest.Response);

  // Consultas
  rpc ConsultarInventario(ConsultarInventarioRequest) returns (ConsultarInventarioRequest.Response);

  // Gestión de Proveedores
  rpc AgregarProveedor(AgregarProveedorRequest) returns (AgregarProveedorRequest.Response);

  // Creacion de inventario
  rpc CrearInventario(CrearInventarioRequest) returns (CrearInventarioRequest.Response);
  
  // Integración con Ventas
  rpc RegistrarVenta(RegistrarVentaRequest) returns (RegistrarVentaRequest.Response);
}

// ========================================
//!SECTION - Servicios
// ========================================