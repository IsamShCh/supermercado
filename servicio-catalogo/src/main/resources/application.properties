spring.application.name=servicio
grpc.port=9090
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/catalogo-db
spring.datasource.username=postgres
spring.datasource.password=contrasena_secreta

#spring.batch.jdbc.initialize-schema=always
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Con esto desactivvo las validaciones automaticas. Las validaciones se realizan manualmente con un validator
spring.jpa.properties.jakarta.persistence.validation.mode=none

# Cliente gRPC Usuarios
grpc.client.usuarios.host=localhost
grpc.client.usuarios.port=9093