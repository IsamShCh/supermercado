spring.application.name=servicio
grpc.port=9092
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5434/ventas-db
spring.datasource.username=postgres
spring.datasource.password=contrasena_secreta

#spring.batch.jdbc.initialize-schema=always
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Con esto desactivvo las validaciones automaticas. Las validaciones se realizan manualmente con un validator
spring.jpa.properties.jakarta.persistence.validation.mode=none

# Indica a Spring que siempre inicialice la base de datos usando scripts SQL
spring.sql.init.mode=always
# Hibernate crea las tablas ANTES de ejecutar schema.sql
spring.jpa.defer-datasource-initialization=true
